<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Fotos</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; color: #333; }
        .form-container { background: #f9f9f9; padding: 25px; border-radius: 8px; border: 1px solid #e0e0e0; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 7px; font-weight: bold; }
        input[type="text"], input[type="file"] { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { background-color: #28a745; color: white; padding: 12px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #218838; }
        .flash-message { background-color: #d4edda; color: #155724; padding: 12px; margin-bottom: 20px; border-radius: 4px; border: 1px solid #c3e6cb; }
        
        /* Preview via Javascript */
        #preview-container { margin-top: 15px; display: none; }
        #image-preview { max-width: 200px; max-height: 200px; border-radius: 4px; border: 2px dashed #ccc; }
        
        /* Galeria Grid */
        .gallery { margin-top: 40px; display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .gallery-item { border: 1px solid #ddd; border-radius: 6px; overflow: hidden; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .gallery-item img { width: 100%; height: 200px; object-fit: cover; display: block; }
        .gallery-item p { padding: 10px; margin: 0; font-size: 14px; text-align: center; color: #555; }
    </style>
</head>
<body>

    <div class="form-container">
        <form action="{{ url_for('photo.upload_foto') }}" method="POST" enctype="multipart/form-data">
            
            <div class="form-group">
                <label for="photo_file">Selecione a Imagem:</label>
                <input type="file" id="photo_file" name="photo_file" accept="image/*" required>
            </div>

            <div class="form-group" id="preview-container">
                <label>Pré-visualização:</label>
                <img id="image-preview" src="#" alt="Preview">
            </div>
            
            <div class="form-group">
                <label for="subtitle">Legenda (Máx. 100 caracteres):</label>
                <input type="text" id="subtitle" name="subtitle" maxlength="100" placeholder="Insira uma legenda para a foto...">
            </div>
            
            <button type="submit">Gravar no Banco (Bytes)</button>
        </form>
    </div>

    <hr style="margin: 40px 0; border: 0; border-top: 1px solid #eee;">

    <script>
        const photoInput = document.getElementById('photo_file');
        const previewContainer = document.getElementById('preview-container');
        const imagePreview = document.getElementById('image-preview');

        photoInput.addEventListener('change', function() {
            const file = this.files[0];
            
            if (file) {
                const reader = new FileReader();
                
                // Ativa a exibição do container de preview
                previewContainer.style.display = 'block';
                
                // Quando o arquivo terminar de ser lido pelo navegador, joga no src da tag img
                reader.addEventListener('load', function() {
                    imagePreview.setAttribute('src', this.result);
                });
                
                reader.readAsDataURL(file);
            } else {
                // Reseta caso o usuário cancele a seleção
                previewContainer.style.display = 'none';
                imagePreview.setAttribute('src', '#');
            }
        });
    </script>

</body>
</html>
